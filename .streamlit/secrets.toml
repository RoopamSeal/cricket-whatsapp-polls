# IMPORTANT: This is a SAMPLE file. Copy to .streamlit/secrets.toml and fill in your values.
# DO NOT commit secrets.toml to git.

# Admin password for accessing the admin panel
# REQUIRED: Set this to a strong password
admin_password = "admin123"

# Database URL (optional, uses SQLite by default)
# Examples:
#   - SQLite (default): "sqlite:///database.db"
#   - PostgreSQL: "postgresql://user:password@localhost:5432/worldcup_polls"
# database_url = "sqlite:///database.db"

# Email verification for voting (optional)
# Set to true to require email verification before voting
enable_email_verification = false

# Email configuration (required only if enable_email_verification = true)
# smtp_server = "smtp.gmail.com"
# smtp_port = 587
# smtp_username = "your-email@gmail.com"
# smtp_password = "YOUR_EMAIL_PASSWORD_HERE"
# smtp_from_email = "noreply@worldcup-polls.com"

# Rate limiting
# Maximum votes a single voter can cast per day
max_votes_per_day = 10

# IP tracking for voting prevention
# Set to true to track and prevent multiple votes from same IP
track_voter_ip = true

# Google Analytics (optional)
# google_analytics_id = "GA_TRACKING_ID"

# Logging
# Options: "debug", "info", "warning", "error", "critical"
log_level = "info"
